<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<form>
    <caption>Registration form</caption><br><br>
    <label for="username"></label>
    <input type="text" name="username" id="username" placeholder="Username"><br><br>
    <label for="password"></label>
    <input type="password" name="password" id="password" placeholder="Password"><br>
    <h4>Select your Class</h4>  
        <label for="Class XI">
        <input type="radio" name="class" id="Class XI"> Class XI
        </label><br>
        <label for="Class XII">
            <input type="radio" name="class" id="Class XII"> Class XII
        </label><br>
        <h4>Select your Favourite Subjects</h4>
        <div>
            <input type="checkbox" name="maths" id="maths"> Maths<br>
            <input type="checkbox" name="Urdu" id="Urdu"> Urdu<br>
            <input type="checkbox" name="English" id="English"> English<br>
             <input type="checkbox" name="Computer Science" id="Computer Science"> Computer Science<br>
            <input type="checkbox" name="Pakistan Studies" id="Pakistan Studies"> Pakistan Studies<br>
            <input type="checkbox" name="Accounting" id="Accounting"> Accounting<br>
        </div>
        Select Your City
        <select name="city">
            <option value="Karachi"> Karachi</option>
            <option value="Hyderabad"> Hyderabad</option>
            <option value="Lahore"> Lahore</option>
            <option value="Islamabad"> Islamabad</option>
            <option value="Peshawar"> Peshawar</option>
        </select><br><br>
        <textarea name="Feedback" id="Feedback" placeholder="Enter Your Valuable Feedback here." rows="5"></textarea>
</form><input type="submit" value="Submit">

</body>
</html>
